<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Être payé pour jouer à Roblox -Fixed</title>
    <style>
        /* CSS resets for a clean start */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #05041a 0%, #1a0a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        /* Container for the page content, set to mobile-first width */
        .landing-page-container {
            width: 100%;
            max-width: 375px; /* Common mobile width */
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logos section styles */
        .logos-section {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Important to contain the image */
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .logo-circle img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .cross-icon {
            font-size: 24px;
            font-weight: bold;
            color: #ccc;
        }

        /* Verified badge styles */
        .verified-badge {
            background-color: rgba(0, 128, 0, 0.1);
            color: #4ade80; /* A vibrant light green */
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 128, 0, 0.3);
        }

        .verified-badge img {
            width: 16px;
            height: 16px;
        }

        /* Headline styles */
        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            line-height: 1.2;
            max-width: 300px;
        }

        /* Purple download button styles */
        .download-button {
            background-color: #8b5cf6; /* A vibrant purple */
            color: white;
            border: none;
            padding: 18px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 320px;
            cursor: pointer;
            margin-bottom: 30px;
            text-decoration: none;
            transition: background-color 0.2s;
            box-shadow: 0 6px 15px rgba(139, 92, 246, 0.3);
        }

        .download-button:hover {
            background-color: #7c3aed; /* Darker purple on hover */
        }

        .download-button img {
            width: 18px;
            height: 18px;
        }

        /* Disclaimer paragraph styles */
        .disclaimer-text {
            font-size: 12px;
            color: #94a3b8; /* A muted gray-blue */
            line-height: 1.5;
            max-width: 280px;
        }
    </style>
</head>
<body>

    <div class="landing-page-container">
        
        <div class="logos-section">
            <div class="logo-circle">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTCJAT7iNdljL2ZmI8_2MTH92ZbhLDSZaVAzQ&s" alt="Logo">
            </div>
            <span class="cross-icon">×</span>
            <div class="logo-circle" style="background-color: black;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ee/Roblox_Logo.svg" alt="Roblox Logo">
            </div>
        </div>

        <div class="verified-badge">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Tiktok_icon.svg/512px-Tiktok_icon.svg.png" alt="TikTok Icon">
            <span>Vérifié par TikTok</span>
        </div>

        <h1>Être payé pour jouer à Roblox</h1>

        <a href="#" class="download-button">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Download_alt_font_awesome.svg/1024px-Download_alt_font_awesome.svg.png" alt="Download Icon" style="filter: invert(1);">
            <span>TÉLÉCHARGER MAINTENANT</span>
        </a>

        <p class="disclaimer-text">Approuvé par plus de 500 000 utilisateurs rémunérés chaque jour</p>

    </div>

</body>
</html>
