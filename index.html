<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Continue</title>
<style>
  body {
    background-color: #12120e;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  .continue-btn {
    background: #ffeb3b;
    color: #2b2600;
    text-decoration: none;
    padding: 16px 36px;
    border-radius: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-weight: 800;
    font-size: 18px;
    box-shadow: 0 8px 24px rgba(255,235,59,.25);
    transition: transform 0.1s ease;
  }
  .continue-btn:active {
    transform: scale(0.95);
  }
</style>
</head>
<body>

  <a href="#" id="continueBtn" class="continue-btn">Continue</a>

<script>
  (function() {
    // 1. Define your main landing page file
    var landingPageFile = "/offer.html"; 

    // 2. Construct the URL and grab any tracking tags
    var host = window.location.host;
    var query = window.location.search; 
    var targetUrl = host + landingPageFile + query;

    // 3. Detect Android vs iOS
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var isAndroid = /android/i.test(ua.toLowerCase());

    // 4. Set the correct URL scheme bypass
    var finalRedirectUrl = "";
    if (isAndroid) {
      finalRedirectUrl = "intent://" + targetUrl + "#Intent;scheme=https;end";
    } else {
      finalRedirectUrl = "x-safari-https://" + targetUrl;
    }

    // 5. Attach the bypass link directly to the button
    document.getElementById('continueBtn').href = finalRedirectUrl;
  })();
</script>
</body>
</html>
