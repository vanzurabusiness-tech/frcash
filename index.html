<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Otwórz w przeglądarce</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JW1QWB73B1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JW1QWB73B1');
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #151c28;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .wrapper { width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center; }
        .icon-box {
            width: 80px; height: 80px; background: #252d3d; border-radius: 18px;
            display: flex; justify-content: center; align-items: center; margin-bottom: 28px;
        }
        .icon-box svg { width: 36px; height: 36px; color: #ffffff; }
        .title { font-size: 26px; font-weight: 700; color: #ffffff; text-align: center; margin-bottom: 14px; }
        .title span { color: #4ade80; }
        .subtitle { font-size: 15px; color: #8a93a8; text-align: center; line-height: 1.7; margin-bottom: 48px; max-width: 340px; }
        .cta-button {
            background: #4ade80; color: #000000; font-size: 16px; font-weight: 900;
            padding: 22px 0; border-radius: 12px; border: none; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; width: 100%; transition: background 0.2s ease;
        }
        .cta-button:hover { background: #22c55e; }
        .cta-button:active { transform: translateY(1px); }
        .sub-text { margin-top: 14px; font-size: 13px; color: #4ade80; text-align: center; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="icon-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"></path><path d="M2 12H22"></path><path d="M12 2C14.5013 4.73835 15.9228 8.29203 16 12C15.9228 15.708 14.5013 19.2616 12 22C9.49872 19.2616 8.07725 15.708 8 12C8.07725 8.29203 9.49872 4.73835 12 2V2Z"></path></svg>
        </div>
        <h1 class="title">Opuść <span>TikTok</span></h1>
        <p class="subtitle">Aby kontynuować i odblokować wypłaty, otwórz tę stronę w domyślnej przeglądarce.</p>
        
        <button class="cta-button" onclick="breakOut()">Otwórz Przeglądarkę</button>
        
        <div class="sub-text">Zalecane dla bezpieczeństwa konta</div>
    </div>

    <script>
        // ==========================================================
        // UPDATE THIS: Change "TWOJA-DOMENA.PL" to your actual domain
        // ==========================================================
        var MAIN_LP_URL = 'https://rewger.org/lp.html'; 

        const isAndroid = () => /android/i.test(navigator.userAgent);

        function breakOut() {
            try {
                gtag('event', 'open-browser', {
                    'event_category': 'engagement',
                    'event_label': 'tiktok_breakout'
                });
            } catch (e) {}

            setTimeout(function() {
                if (isAndroid()) {
                    const intentUrl = `intent://${MAIN_LP_URL.replace(/^https?:\/\//, '')}#Intent;scheme=https;end`;
                    window.location.href = intentUrl;
                } else {
                    window.location.href = MAIN_LP_URL.replace(/^https:\/\//, 'x-safari-https://');
                }
            }, 300);
        }
    </script>
</body>
</html>
